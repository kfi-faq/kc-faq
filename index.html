<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よくあるご質問 | 快活CLUB</title>
    <!-- 🌐 SNSアイコン表示用のフォントファイルを読み込み -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            line-height: 1.7;
            background-color: #f7f9fa; /* すっきりした薄いグレー背景 */
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* ─── 快活CLUB完全再現：グローバルヘッダー（白背景） ─── */
        .kaikatsu-global-header {
            background-color: #ffffff;
            border-bottom: 1px solid #e1e8ed;
            padding: 12px 24px;
        }
        .header-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        /* ロゴ消滅バグを完全に防ぐ固定サイズ */
        .logo-link img {
            height: 44px; 
            width: auto;
            display: block;
        }
        /* 左側ナビゲーション */
        .main-nav {
            display: flex;
            gap: 22px;
        }
        .main-nav a {
            color: #f37022; /* 快活オレンジ */
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 0.05em;
        }
        .main-nav a:hover {
            color: #d65d13;
            text-decoration: underline;
        }

        /* 右側ボタン・SNS群 */
        .btn-reserve {
            background-color: #004494; /* 青い角丸ボタン */
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 0.03em;
            transition: opacity 0.2s;
        }
        .btn-contact {
            background-color: #000000; /* 黒い角丸ボタン */
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 0.03em;
            transition: opacity 0.2s;
        }
        .btn-reserve:hover, .btn-contact:hover {
            opacity: 0.8;
        }
        .sns-links {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .sns-icon {
            color: #f37022; /* 快活オレンジ色のアイコン */
            font-size: 20px;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .sns-icon:hover {
            transform: scale(1.1);
        }

        /* ─── 快活CLUB完全再現：メインビジュアル帯（ダークブラウン） ─── */
        .kaikatsu-sub-header {
            background-color: #2b1f1d; /* シックな高級感のあるダークブラウン */
            color: #ffffff;
            padding: 25px 20px;
        }
        .sub-header-inner {
            max-width: 1000px;
            margin: 0 auto;
        }
        .breadcrumb {
            font-size: 12px;
            color: #b3a2a0;
            margin-bottom: 20px;
        }
        .breadcrumb a {
            color: #b3a2a0;
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .main-title {
            font-size: 28px;
            font-weight: bold;
            margin: 0;
            text-align: center;
            letter-spacing: 0.1em;
        }

        /* ─── コンテナ ─── */
        .main-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        h2 {
            font-size: 22px;
            color: #002554;
            border-bottom: 2px solid #002554;
            padding-bottom: 10px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 40px;
        }

        /* ─── Q&Aカードデザイン ─── */
        .qa-card {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .box-q, .box-a {
            background-color: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            padding: 25px 30px;
            display: flex;
            align-items: flex-start;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .box-q {
            border-left: 6px solid #f37022;
        }
        .box-a {
            border-left: 6px solid #002554;
        }
        
        .prefix-q, .prefix-a {
            font-size: 24px;
            font-weight: 900;
            margin-right: 20px;
            flex-shrink: 0;
            line-height: 1;
            font-family: 'Arial Black', sans-serif;
        }
        .prefix-q { color: #f37022; }
        .prefix-a { color: #002554; }

        .text-q {
            font-size: 18px;
            font-weight: bold;
            color: #002554;
            margin: 0;
        }
        .text-a {
            font-size: 16px;
            color: #333;
            white-space: pre-wrap;
            margin: 0;
            width: 100%;
        }

        /* アンケートエリア */
        .survey-area {
            border-top: 1px dashed #e1e8ed;
            margin-top: 30px;
            padding-top: 25px;
            text-align: center;
        }
        .survey-title {
            font-size: 14px;
            color: #555;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .survey-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-survey {
            background-color: #fff;
            border: 2px solid #002554;
            color: #002554;
            border-radius: 4px;
            padding: 8px 35px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 110px;
        }
        .btn-survey:hover {
            background-color: #002554;
            color: #fff;
        }
        .survey-thanks {
            color: #198754;
            font-weight: bold;
            font-size: 14px;
            background-color: #e8f5e9;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 4px;
        }

        /* ボタン＆リスト */
        .btn-back {
            display: block;
            width: 100%;
            background-color: #002554;
            border: none;
            border-radius: 4px;
            padding: 14px 0;
            text-align: center;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            margin-top: 30px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        .btn-back:hover {
            background-color: #001838;
        }

        .list-item {
            background: #fff;
            margin-bottom: 12px;
            padding: 18px 25px;
            border-radius: 6px;
            border: 1px solid #e1e8ed;
            border-left: 4px solid #002554;
            transition: all 0.2s;
        }
        .list-item:hover {
            border-left-color: #f37022;
            transform: translateX(4px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .list-item a {
            color: #333;
            text-decoration: none;
            font-weight: bold;
            display: block;
        }
        .list-item:hover a {
            color: #f37022;
        }
        
        /* スマホ用レスポンシブ対応 */
        @media (max-width: 992px) {
            .header-container { flex-direction: column; align-items: flex-start; }
            .header-left, .header-right { width: 100%; justify-content: space-between; flex-wrap: wrap; }
            .main-nav { width: 100%; justify-content: space-between; margin-top: 10px; }
        }
    </style>
</head>
<body>

<!-- ─── 完璧再現：白ベースのグローバルヘッダー ─── -->
<header class="kaikatsu-global-header">
    <div class="header-container">
        <!-- 左側：ロゴと指定メニューリンク -->
        <div class="header-left">
            <a href="./" class="logo-link">
                <img src="logo01.svg" alt="快活CLUB">
            </a>
            <nav class="main-nav">
                <a href="https://www.kaikatsu.jp/guide/" target="_blank">はじめての方</a>
                <a href="https://www.kaikatsu.jp/shop/" target="_blank">店舗検索・料金</a>
                <a href="https://www.kaikatsu.jp/enjoy/" target="_blank">快活CLUBのサービス</a>
                <a href="https://www.kaikatsu.jp/food/" target="_blank">お食事メニュー</a>
            </nav>
        </div>
        <!-- 右側：各種予約・SNSリンク -->
        <div class="header-right">
            <a href="https://reservation.kaikatsu.jp/" target="_blank" class="btn-reserve">鍵付完全個室WEB予約</a>
            <a href="https://www.kaikatsu.jp/contact/" target="_blank" class="btn-contact">お問い合わせ</a>
            <div class="sns-links">
                <a href="https://x.com/kaikatsuclub_jp" target="_blank" class="sns-icon"><i class="fab fa-twitter"></i></a>
                <a href="https://www.facebook.com/kaikatsu.jp/" target="_blank" class="sns-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/kaikatsuclub_jp/" target="_blank" class="sns-icon"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>
</header>

<!-- ─── 完璧再現：ダークブラウンのビジュアル帯（パンくず付） ─── -->
<div class="kaikatsu-sub-header">
    <div class="sub-header-inner">
        <div class="breadcrumb">
            <a href="https://www.kaikatsu.jp/" target="_blank">快活CLUBトップ</a> &gt; <span id="breadcrumb-current">よくあるご質問</span>
        </div>
        <h1 class="main-title" id="dynamic-title">よくあるご質問</h1>
    </div>
</div>

<!-- メインコンテンツ -->
<main class="main-container" id="main-content">
    <p class="loading">データを読み込み中...</p>
</main>

<script>
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdgSExp6LSczREuzJmX20E7sNuAHQNFOxSzu-eaMYi-wQVuxg/formResponse";
    const ENTRY_ID_FAQ    = "entry.1110027652";
    const ENTRY_ID_VOTE   = "entry.524450877";

    async function loadFAQ() {
        const mainContent = document.getElementById('main-content');
        const dynamicTitle = document.getElementById('dynamic-title');
        const breadcrumbCurrent = document.getElementById('breadcrumb-current');
        
        try {
            const response = await fetch('./faq_data.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error('データ取得失敗');
            
            const data = await response.json();
            const urlParams = new URLSearchParams(window.location.search);
            const faqIdStr = urlParams.get('id');
            
            // 1ページ1FAQ 表示モード
            if (faqIdStr) {
                const currentFaq = data.find(item => item.id === faqIdStr);
                
                if (currentFaq) {
                    dynamicTitle.textContent = currentFaq.question;
                    breadcrumbCurrent.textContent = "FAQ詳細"; // パンくずを詳細用に連動
                    
                    mainContent.innerHTML = `
                        <div class="qa-card">
                            <div class="box-q">
                                <span class="prefix-q">Q</span>
                                <p class="text-q">${currentFaq.question}</p>
                            </div>
                            <div class="box-a">
                                <span class="prefix-a">A</span>
                                <div style="width: 100%;">
                                    <p class="text-a">${currentFaq.answer}</p>
                                    <div class="survey-area" id="survey-box">
                                        <p class="survey-title">上記Q&Aは参考になりましたか？</p>
                                        <div class="survey-buttons">
                                            <button class="btn-survey" onclick="submitSurvey('${faqIdStr}', 'はい')">はい</button>
                                            <button class="btn-survey" onclick="submitSurvey('${faqIdStr}', 'いいえ')">いいえ</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <a href="./" class="btn-back">検索結果一覧に戻る</a>
                    `;
                    return;
                }
            }
            
            // 一覧表示モード
            dynamicTitle.textContent = "よくあるご質問";
            breadcrumbCurrent.textContent = "よくあるご質問";
            mainContent.innerHTML = '<h2>ご質問一覧</h2>';
            
            if (data.length === 0) {
                mainContent.innerHTML += '<p class="loading">現在FAQはありません。</p>';
                return;
            }
            
            data.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<a href="./?category=${item.category}&id=${item.id}">Q. ${item.question}</a>`;
                mainContent.appendChild(div);
            });
            
        } catch (error) {
            console.error(error);
            mainContent.innerHTML = '<p class="loading" style="color:red;">データの読み込みに失敗しました。</p>';
        }
    }

    // アンケート送信処理
    function submitSurvey(faqId, voteValue) {
        const surveyBox = document.getElementById('survey-box');
        surveyBox.innerHTML = '<p class="survey-thanks">🎉 投票ありがとうございました。</p>';

        const params = new URLSearchParams();
        params.append(ENTRY_ID_FAQ, "FAQ-" + faqId);
        params.append(ENTRY_ID_VOTE, voteValue);

        fetch(GOOGLE_FORM_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params
        }).catch(err => console.log("送信完了"));
    }

    window.addEventListener('DOMContentLoaded', loadFAQ);
</script>

</body>
</html>
