<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お客様サポート - FAQ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f9fafb;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .faq-container {
            max-width: 650px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #111827;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .loading {
            text-align: center;
            color: #6b7280;
            font-style: italic;
        }
        
        /* --- 一覧表示用のスタイル --- */
        details {
            border-bottom: 1px solid #e5e7eb;
            padding: 15px 0;
        }
        details[open] {
            border-bottom: 1px solid #3b82f6;
        }
        summary {
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            position: relative;
            padding-right: 20px;
        }
        summary::-webkit-details-marker {
            display: none;
        }
        summary::after {
            content: '＋';
            position: absolute;
            right: 0;
            color: #9ca3af;
        }
        details[open] summary::after {
            content: '－';
            color: #3b82f6;
        }
        .answer {
            margin-top: 10px;
            padding-left: 10px;
            color: #4b5563;
            white-space: pre-wrap;
        }

        /* --- 1ページ1FAQ（単体表示）用のスタイル --- */
        .single-faq {
            padding: 10px 0;
        }
        .single-question {
            font-size: 20px;
            font-weight: bold;
            color: #1e3a8a;
            border-left: 4px solid #3b82f6;
            padding-left: 15px;
            margin-bottom: 20px;
        }
        .single-answer {
            font-size: 16px;
            color: #374151;
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            white-space: pre-wrap;
        }
        .back-button {
            display: inline-block;
            margin-top: 30px;
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .back-button:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="faq-container">
    <h1 id="page-title">よくあるご質問（FAQ）</h1>
    <div id="faq-content">
        <p class="loading">データを読み込み中...</p>
    </div>
</div>

<script>
    async function loadFAQ() {
        const faqContent = document.getElementById('faq-content');
        const pageTitle = document.getElementById('page-title');
        
        try {
            // スプレッドシートから同期されたJSONを読み込む
            const response = await fetch('./faq_data.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error('データの取得に失敗しました');
            
            const data = await response.json();
            faqContent.innerHTML = '';
            
            // URLパラメータ（?id=1 など）を取得する
            const urlParams = new URLSearchParams(window.location.search);
            const faqIdStr = urlParams.get('id');
            
            // ----------------------------------------------------
            // パターンA：URLに ?id=数字 が指定されている場合（1ページ1FAQ）
            // ----------------------------------------------------
            if (faqIdStr) {
                const index = parseInt(faqIdStr, 10) - 1; // 配列用に1を引く
                
                // 指定された番号のFAQが存在するかチェック
                if (data[index]) {
                    // タイトルを「Q&A」などに書き換える
                    pageTitle.textContent = "ご質問への回答";
                    
                    // 1つのFAQだけを組み立てて表示（アコーディオンではなく最初から全開）
                    faqContent.innerHTML = `
                        <div class="single-faq">
                            <div class="single-question">Q. ${data[index].question}</div>
                            <div class="single-answer">${data[index].answer}</div>
                        </div>
                        <a href="./" class="back-button">← FAQ一覧へ戻る</a>
                    `;
                    return; // 処理をここで終了
                }
            }
            
            // ----------------------------------------------------
            // パターンB：URLに id の指定がない、または無効な場合（通常の一覧表示）
            // ----------------------------------------------------
            pageTitle.textContent = "よくあるご質問（FAQ）";
            if (data.length === 0) {
                faqContent.innerHTML = '<p class="loading">現在、よくあるご質問はありません。</p>';
                return;
            }
            
            data.forEach((item, i) => {
                const details = document.createElement('details');
                const summary = document.createElement('summary');
                summary.textContent = item.question;
                
                const answerDiv = document.createElement('div');
                answerDiv.className = 'answer';
                answerDiv.textContent = item.answer;
                
                // 💡一覧画面で、各FAQの下に「このFAQの専用URL」をこっそり配置したい場合は以下を有効にしてください
                // const id = i + 1;
                // const link = document.createElement('a');
                // link.href = `./?id=${id}`;
                // link.textContent = "【この質問の専用ページを開く】";
                // link.style.cssText = "display:block; font-size:11px; color:#9ca3af; text-decoration:none; margin-top:5px;";
                // answerDiv.appendChild(link);
                
                details.appendChild(summary);
                details.appendChild(answerDiv);
                faqContent.appendChild(details);
            });
            
        } catch (error) {
            console.error(error);
            faqContent.innerHTML = '<p class="loading" style="color: #ef4444;">FAQの読み込みに失敗しました。</p>';
        }
    }
    window.addEventListener('DOMContentLoaded', loadFAQ);
</script>

</body>
</html>
