<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よくあるご質問｜快活CLUB</title>
    <!-- 🌐 本家で使用されているフォントとアイコンを読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* ─── 本家公式CSS完全移植 ─── */
        body {
            font-family: "Noto Sans JP", "ヒラギノ角ゴ Pro W3", "Hiragino Kaku Gothic Pro", "メイリオ", "Meiryo", sans-serif;
            line-height: 1.6em;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
        }
        * {
            box-sizing: border-box;
        }

        /* ─── 1. 公式ヘッダー（height: 80px、ロゴ縦幅完全一致） ─── */
        header {
            position: fixed;
            left: 0px;
            top: 0px;
            width: 100%;
            min-width: 1250px;
            height: 80px;
            z-index: 100;
            display: flex;
            background: #ffffff;
            box-shadow: 0px 2px 3px rgba(0, 0, 0, 0.1);
        }
        
        header .logo {
            position: relative;
            width: 80px;
            height: 80px;
            z-index: 1;
        }
        header .logo a {
            display: block;
            width: 100%;
            height: 100%;
        }
        header .logo img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        header .menu {
            margin: 0;
            padding: 0 18px;
            list-style: none;
            display: flex;
            z-index: 1;
        }
        header .menu > li > a {
            position: relative;
            display: flex;
            align-items: center;
            height: 80px;
            padding: 0 16px;
            font-size: 16px;
            font-weight: bold;
            color: #ec661b;
            text-decoration: none;
            transition: color 0.4s ease;
        }
        header .menu > li > a:hover {
            color: #000000;
        }

        header .menu-right {
            position: absolute;
            right: 0px;
            top: 0;
            bottom: 0;
            margin: auto;
            height: 50px;
            width: auto;
            display: flex;
            align-items: center;
            z-index: 1;
        }
        header .menu-right .link {
            margin: 0;
            padding: 0 15px 0 0;
            list-style: none;
            display: flex;
            align-items: center;
        }
        header .menu-right .link li {
            margin: 0 8px;
        }
        header .menu-right .link a.btn-inquiry {
            display: block;
            background: #000000;
            padding: 0 1.2em;
            font-size: 12px;
            line-height: 32px;
            font-weight: bold;
            color: #ffffff;
            border-radius: 16px;
            text-decoration: none;
        }
        header .menu-right .link a.btn-inquiry.btn-reservation {
            background: #043491;
        }
        header .menu-right .link a:hover {
            opacity: 0.8;
        }

        header .menu-right .sns {
            margin: 0;
            padding: 0 25px 0 0;
            list-style: none;
            display: flex;
            align-items: center;
        }
        header .menu-right .sns li {
            margin-right: 15px;
        }
        header .menu-right .sns li:last-child {
            margin-right: 0;
        }
        header .menu-right .sns a {
            font-size: 24px;
            line-height: 1em;
            color: #ec661b;
            text-decoration: none;
        }

        /* ─── 2. 公式パンくずリスト（透過グレーは維持） ─── */
        .breadcrumbs {
            position: absolute;
            left: 0px;
            top: 80px; /* ヘッダーの直下にジャスト配置 */
            width: 100%;
            background: rgba(0, 0, 0, 0.4); /* ユーザーお気に入りの透過グレー */
            padding: 0.75em 1.2em;
            z-index: 98;
            margin: 0;
        }
        .breadcrumbs ol {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
        }
        .breadcrumbs li {
            margin-right: 1.5em;
            position: relative;
            font-size: 12px;
            color: #ffffff;
        }
        .breadcrumbs li a {
            font-size: 12px;
            color: #ffffff;
            text-decoration: none;
        }
        .breadcrumbs li a:hover {
            text-decoration: underline;
        }
        .breadcrumbs li::after {
            content: "";
            position: absolute;
            display: block;
            top: 50%;
            right: -1em;
            width: 0.4em;
            height: 0.4em;
            margin-top: -0.2em;
            border-top: solid 1px #ffffff;
            border-right: solid 1px #ffffff;
            transform: rotate(45deg);
        }
        .breadcrumbs li:last-child::after {
            display: none;
        }

        /* ─── 3. 公式サブヘッダー（隙間を完全消滅＋薄いグレーフィルターを全撤去） ─── */
        main.lower {
            position: relative;
            display: block;
            padding-top: 80px; /* ヘッダーの高さ分の余白 */
        }
        /* 💡本家と全く同じ「静的ブロック＋インラインパディング」構造に戻し、白い隙間を完全消滅させました */
        .lower-visual {
            position: relative;
            padding-top: 300px; /* 本家公式のダイナミックな縦幅 */
            box-sizing: border-box;
        }
        .lower-visual .bgi {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-image: url("lower-visual.jpg");
            background-size: cover;
            background-position: center;
        }
        /* ⚠️ご指摘通り、全体の薄い透過グレーフィルター（::before）は完全に削除しました！ */

        .lower-visual .title {
            position: absolute;
            width: 100%;
            margin-top: 1%;
            top: 40%;
            left: 0;
            transform: translate(0, -50%);
            font-size: 36px;
            font-weight: normal;
            color: #ffffff;
            text-align: center;
            z-index: 2;
            letter-spacing: 0.02em;
            margin: 0;
            /* 文字の輪郭をくっきりさせて本家同様の視認性を確保 */
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
        }

        /* ─── 4. メインコンテンツ ─── */
        .main-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        h2.headline {
            font-size: 28px;
            line-height: 1.6em;
            font-weight: bold;
            text-align: center;
            padding: 10px 0;
            border-bottom: 1px solid #000000;
            margin-bottom: 40px;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 40px;
        }

        /* Q&Aカードデザイン */
        .qa-card {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .box-q, .box-a {
            background-color: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            padding: 25px 30px;
            display: flex;
            align-items: flex-start;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .box-q {
            border-left: 6px solid #ec661b;
        }
        .box-a {
            border-left: 6px solid #000000;
        }
        
        .prefix-q, .prefix-a {
            font-size: 24px;
            font-weight: 900;
            margin-right: 20px;
            flex-shrink: 0;
            line-height: 1;
            font-family: 'Arial Black', sans-serif;
        }
        .prefix-q { color: #ec661b; }
        .prefix-a { color: #000000; }

        .text-q {
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            margin: 0;
        }
        .text-a {
            font-size: 16px;
            color: #333;
            white-space: pre-wrap;
            margin: 0;
            width: 100%;
        }

        /* アンケートエリア */
        .survey-area {
            border-top: 1px solid #fff;
            background: #efefef;
            margin-top: 30px;
            padding: 1.5em 54px;
            text-align: center;
        }
        .survey-title {
            font-size: 14px;
            color: #555;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .survey-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-survey {
            background-color: #fff;
            border: 2px solid #ec661b;
            color: #ec661b;
            border-radius: 4px;
            padding: 8px 35px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 110px;
        }
        .btn-survey:hover {
            background-color: #ec661b;
            color: #fff;
        }
        .survey-thanks {
            color: #198754;
            font-weight: bold;
            font-size: 14px;
            background-color: #e8f5e9;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 4px;
        }

        /* ボタン＆リスト */
        .btn-back {
            display: block;
            width: 100%;
            background-color: #ec661b;
            border: none;
            border-radius: 4px;
            padding: 14px 0;
            text-align: center;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            margin-top: 30px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        .btn-back:hover {
            background-color: #d65d13;
        }

        .list-item {
            background: #efefef;
            margin-bottom: 10px;
            padding: 0.85em 54px;
            border-radius: 0px;
            border: none;
            transition: all 0.2s;
            position: relative;
        }
        .list-item::after {
            content: "";
            background: #ec661b;
            position: absolute;
            right: 20px;
            top: 50%;
            width: 16px;
            height: 2px;
            transform: translateY(-50%);
        }
        .list-item::before {
            content: "";
            background: #ec661b;
            position: absolute;
            right: 27px;
            top: 50%;
            width: 2px;
            height: 16px;
            transform: translateY(-50%);
        }
        .list-item:hover {
            background-color: #e5e5e5;
        }
        .list-item a {
            color: #333;
            text-decoration: none;
            font-weight: bold;
            display: block;
            font-size: 18px;
        }
    </style>
</head>
<body>

<!-- ─── 1. グローバルヘッダー ─── -->
<header>
    <div class="logo">
        <a href="./">
            <img src="logo01.svg" alt="快活CLUB">
        </a>
    </div>
    <nav>
        <ul class="menu">
            <li><a href="https://www.kaikatsu.jp/guide/" target="_blank">はじめての方</a></li>
            <li><a href="https://www.kaikatsu.jp/shop/" target="_blank">店舗検索・料金</a></li>
            <li><a href="https://www.kaikatsu.jp/enjoy/" target="_blank">快活CLUBのサービス</a></li>
            <li><a href="https://www.kaikatsu.jp/food/" target="_blank">お食事メニュー</a></li>
        </ul>
        <div class="menu-right">
            <ul class="link">
                <li><a href="https://reservation.kaikatsu.jp/" target="_blank" class="hover btn-inquiry btn-reservation">鍵付完全個室WEB予約</a></li>
                <li><a href="https://www.kaikatsu.jp/contact/" target="_blank" class="hover btn-inquiry">お問い合わせ</a></li>
            </ul>
            <ul class="sns">
                <li><a href="https://twitter.com/kaikatsuclub_jp" target="_blank"><i class="fab fa-twitter"></i></a></li>
                <li><a href="https://www.facebook.com/kaikatsu.jp/" target="_blank"><i class="fab fa-facebook-f"></i></a></li>
                <li><a href="https://www.instagram.com/kaikatsuclub_jp/" target="_blank"><i class="fab fa-instagram"></i></a></li>
            </ul>
        </div>
    </nav>
</header>

<!-- ─── 2. サブヘッダー（本家HTML構造を完全トレースして隙間をシャットアウト） ─── -->
<main class="lower">
    <nav class="breadcrumbs">
        <ol>
            <li><a href="https://www.kaikatsu.jp/" target="_blank">快活CLUBトップ</a></li>
            <li><span id="breadcrumb-current">よくあるご質問</span></li>
        </ol>
    </nav>
    <div class="lower-visual">
        <div class="bgi"></div>
        <h1 class="title" id="dynamic-title">よくあるご質問</h1>
    </div>
    
    <!-- 3. メインコンテンツ -->
    <div class="main-container" id="main-content">
        <p class="loading">データを読み込み中...</p>
    </div>
</main>

<script>
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdgSExp6LSczREuzJmX20E7sNuAHQNFOxSzu-eaMYi-wQVuxg/formResponse";
    const ENTRY_ID_FAQ    = "entry.1110027652";
    const ENTRY_ID_VOTE   = "entry.524450877";

    async function loadFAQ() {
        const mainContent = document.getElementById('main-content');
        const dynamicTitle = document.getElementById('dynamic-title');
        const breadcrumbCurrent = document.getElementById('breadcrumb-current');
        
        try {
            const response = await fetch('./faq_data.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error('データ取得失敗');
            
            const data = await response.json();
            const urlParams = new URLSearchParams(window.location.search);
            const faqIdStr = urlParams.get('id');
            
            // 1ページ1FAQ 表示モード
            if (faqIdStr) {
                const currentFaq = data.find(item => item.id === faqIdStr);
                
                if (currentFaq) {
                    dynamicTitle.textContent = currentFaq.question;
                    breadcrumbCurrent.innerHTML = `<a href="./">よくあるご質問</a>`;
                    
                    mainContent.innerHTML = `
                        <div class="qa-card">
                            <div class="box-q">
                                <span class="prefix-q">Q</span>
                                <p class="text-q">${currentFaq.question}</p>
                            </div>
                            <div class="box-a">
                                <span class="prefix-a">A</span>
                                <div style="width: 100%;">
                                    <p class="text-a">${currentFaq.answer}</p>
                                    <div class="survey-area" id="survey-box">
                                        <p class="survey-title">上記Q&Aは参考になりましたか？</p>
                                        <div class="survey-buttons">
                                            <button class="btn-survey" onclick="submitSurvey('${faqIdStr}', 'はい')">はい</button>
                                            <button class="btn-survey" onclick="submitSurvey('${faqIdStr}', 'いいえ')">いいえ</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <a href="./" class="btn-back">検索結果一覧に戻る</a>
                    `;
                    return;
                }
            }
            
            // 一覧表示モード
            dynamicTitle.textContent = "よくあるご質問";
            breadcrumbCurrent.textContent = "よくあるご質問";
            mainContent.innerHTML = '<h2 class="headline">ご質問一覧</h2>';
            
            if (data.length === 0) {
                mainContent.innerHTML += '<p class="loading">現在FAQはありません。</p>';
                return;
            }
            
            data.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<a href="./?category=${item.category}&id=${item.id}">Q. ${item.question}</a>`;
                mainContent.appendChild(div);
            });
            
        } catch (error) {
            console.error(error);
            mainContent.innerHTML = '<p class="loading" style="color:red;">データの読み込みに失敗しました。</p>';
        }
    }

    function submitSurvey(faqId, voteValue) {
        const surveyBox = document.getElementById('survey-box');
        surveyBox.innerHTML = '<p class="survey-thanks">🎉 投票ありがとうございました。</p>';

        const params = new URLSearchParams();
        params.append(ENTRY_ID_FAQ, "FAQ-" + faqId);
        params.append(ENTRY_ID_VOTE, voteValue);

        fetch(GOOGLE_FORM_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params
        }).catch(err => console.log("送信完了"));
    }

    window.addEventListener('DOMContentLoaded', loadFAQ);
</script>

</body>
</html>
