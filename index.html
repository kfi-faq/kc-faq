<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よくあるご質問 | カスタマーサポート</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            line-height: 1.7;
            background-color: #f7f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .kaikatsu-header {
            background-color: #002554;
            color: #fff;
            padding: 18px 20px;
            text-align: center;
            border-bottom: 4px solid #f37022;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
        }
        /* 💡ロゴ消滅バグ対策：縦横サイズをブラウザに明示 */
        .logo-area {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
        }
        .logo-area img {
            height: 40px; 
            width: auto; 
            display: block;
            object-fit: contain;
        }
        .page-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0;
            padding: 0 160px;
            letter-spacing: 0.05em;
        }

        .main-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        h2 {
            font-size: 22px;
            color: #002554;
            border-bottom: 2px solid #002554;
            padding-bottom: 10px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 40px;
        }

        /* ─── 快活CLUB風：Q&Aカードデザイン ─── */
        .qa-card {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .box-q, .box-a {
            background-color: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            padding: 25px 30px;
            display: flex;
            align-items: flex-start;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        /* Qボックス：左側にオレンジの太線 */
        .box-q {
            border-left: 6px solid #f37022;
            background-color: #fff;
        }
        /* Aボックス：左側に濃紺の太線 */
        .box-a {
            border-left: 6px solid #002554;
            background-color: #fff;
        }
        
        .prefix-q, .prefix-a {
            font-size: 24px;
            font-weight: 900;
            margin-right: 20px;
            flex-shrink: 0;
            line-height: 1;
            font-family: 'Arial Black', sans-serif;
        }
        .prefix-q { color: #f37022; } /* Qはオレンジ */
        .prefix-a { color: #002554; } /* Aは濃紺 */

        .text-q {
            font-size: 18px;
            font-weight: bold;
            color: #002554; /* 質問テキストも濃紺に */
            margin: 0;
        }
        .text-a {
            font-size: 16px;
            color: #333;
            white-space: pre-wrap;
            margin: 0;
            width: 100%;
        }

        /* アンケートエリア */
        .survey-area {
            border-top: 1px dashed #e1e8ed;
            margin-top: 30px;
            padding-top: 25px;
            text-align: center;
        }
        .survey-title {
            font-size: 14px;
            color: #555;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .survey-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-survey {
            background-color: #fff;
            border: 2px solid #002554;
            color: #002554;
            border-radius: 4px;
            padding: 8px 35px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 110px;
        }
        .btn-survey:hover {
            background-color: #002554;
            color: #fff;
        }
        .survey-thanks {
            color: #198754;
            font-weight: bold;
            font-size: 14px;
            background-color: #e8f5e9;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 4px;
        }

        /* ─── 快活CLUB風：ボタン＆リスト ─── */
        .btn-back {
            display: block;
            width: 100%;
            background-color: #002554;
            border: none;
            border-radius: 4px;
            padding: 14px 0;
            text-align: center;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            margin-top: 30px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        .btn-back:hover {
            background-color: #001838;
        }

        /* 一覧表示のリストアイテム */
        .list-item {
            background: #fff;
            margin-bottom: 12px;
            padding: 18px 25px;
            border-radius: 6px;
            border: 1px solid #e1e8ed;
            border-left: 4px solid #002554; /* リストの左側にも濃紺のアクセント */
            transition: all 0.2s;
        }
        .list-item:hover {
            border-left-color: #f37022; /* ホバーするとオレンジに変化 */
            transform: translateX(4px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .list-item a {
            color: #333;
            text-decoration: none;
            font-weight: bold;
            display: block;
        }
        .list-item:hover a {
            color: #f37022; /* 文字も快活オレンジに */
        }
    </style>
</head>
<body>

<header class="kaikatsu-header">
    <div class="header-inner">
        <div class="logo-area">
            <img src="logo01.svg" id="logo-img" alt="ロゴ">
        </div>
        <h1 class="page-title" id="dynamic-title">よくあるご質問（FAQ）</h1>
    </div>
</header>

<main class="main-container" id="main-content">
    <p class="loading">データを読み込み中...</p>
</main>

<script>
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdgSExp6LSczREuzJmX20E7sNuAHQNFOxSzu-eaMYi-wQVuxg/formResponse";
    const ENTRY_ID_FAQ    = "entry.1110027652";
    const ENTRY_ID_VOTE   = "entry.524450877";

    async function loadFAQ() {
        const mainContent = document.getElementById('main-content');
        const dynamicTitle = document.getElementById('dynamic-title');
        
        try {
            const response = await fetch('./faq_data.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error('データ取得失敗');
            
            const data = await response.json();
            const urlParams = new URLSearchParams(window.location.search);
            const faqIdStr = urlParams.get('id');
            
            // 1ページ1FAQ 表示モード
            if (faqIdStr) {
                const currentFaq = data.find(item => item.id === faqIdStr);
                
                if (currentFaq) {
                    dynamicTitle.textContent = currentFaq.question;
                    
                    mainContent.innerHTML = `
                        <div class="qa-card">
                            <div class="box-q">
                                <span class="prefix-q">Q</span>
                                <p class="text-q">${currentFaq.question}</p>
                            </div>
                            <div class="box-a">
                                <span class="prefix-a">A</span>
                                <div style="width: 100%;">
                                    <p class="text-a">${currentFaq.answer}</p>
                                    <div class="survey-area" id="survey-box">
                                        <p class="survey-title">上記Q&Aは参考になりましたか？</p>
                                        <div class="survey-buttons">
                                            <button class="btn-survey" onclick="submitSurvey('${faqIdStr}', 'はい')">はい</button>
                                            <button class="btn-survey" onclick="submitSurvey('${faqIdStr}', 'いいえ')">いいえ</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <a href="./" class="btn-back">検索結果一覧に戻る</a>
                    `;
                    return;
                }
            }
            
            // 一覧表示モード
            dynamicTitle.textContent = "よくあるご質問（FAQ）";
            mainContent.innerHTML = '<h2>ご質問一覧</h2>';
            
            if (data.length === 0) {
                mainContent.innerHTML += '<p class="loading">現在FAQはありません。</p>';
                return;
            }
            
            data.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<a href="./?category=${item.category}&id=${item.id}">Q. ${item.question}</a>`;
                mainContent.appendChild(div);
            });
            
        } catch (error) {
            console.error(error);
            mainContent.innerHTML = '<p class="loading" style="color:red;">データの読み込みに失敗しました。</p>';
        }
    }

    // アンケート送信処理
    function submitSurvey(faqId, voteValue) {
        const surveyBox = document.getElementById('survey-box');
        surveyBox.innerHTML = '<p class="survey-thanks">🎉 投票ありがとうございました。</p>';

        const params = new URLSearchParams();
        params.append(ENTRY_ID_FAQ, "FAQ-" + faqId);
        params.append(ENTRY_ID_VOTE, voteValue);

        fetch(GOOGLE_FORM_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params
        }).catch(err => console.log("送信完了"));
    }

    window.addEventListener('DOMContentLoaded', loadFAQ);
</script>

</body>
</html>
