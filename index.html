<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よくあるご質問 | カスタマーサポート</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .orange-header {
            background-color: #f37022;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
        }
        .logo-area {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
        }
        .logo-area img {
            max-height: 45px;
            object-fit: contain;
        }
        .page-title {
            font-size: 22px;
            font-weight: bold;
            margin: 0;
            padding: 0 160px;
        }
        .main-container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .loading {
            text-align: center;
            color: #6b7280;
            font-style: italic;
            padding: 40px;
        }
        .qa-card {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .box-q, .box-a {
            background-color: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            padding: 25px 30px;
            display: flex;
            align-items: flex-start;
        }
        .box-q {
            background-color: #fdfcfb;
            border-color: #f2eade;
        }
        .prefix-q, .prefix-a {
            font-size: 22px;
            font-weight: bold;
            margin-right: 20px;
            flex-shrink: 0;
        }
        .prefix-q { color: #111827; }
        .prefix-a { color: #f37022; }
        .text-q {
            font-size: 18px;
            font-weight: bold;
            color: #111827;
            margin: 2px 0 0 0;
        }
        .text-a {
            font-size: 16px;
            color: #333;
            white-space: pre-wrap;
            margin: 4px 0 0 0;
            width: 100%;
        }
        .survey-area {
            border-top: 1px dashed #e5e5e5;
            margin-top: 30px;
            padding-top: 25px;
            text-align: center;
        }
        .survey-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        .survey-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-survey {
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 8px 35px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 100px;
        }
        .btn-survey:hover {
            background-color: #f9f9f9;
            border-color: #999;
        }
        .survey-thanks {
            color: #22c55e;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-back {
            display: block;
            width: 100%;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 12px 0;
            text-align: center;
            color: #333;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.2s;
        }
        .btn-back:hover {
            background-color: #f9f9f9;
        }
        .list-item {
            background: #fff;
            margin-bottom: 10px;
            padding: 15px 20px;
            border-radius: 4px;
            border: 1px solid #e5e5e5;
        }
        .list-item a {
            color: #f37022;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header class="orange-header">
    <div class="header-inner">
        <div class="logo-area">
            <img src="logo01.svg" id="logo-img" alt="ロゴ">
        </div>
        <h1 class="page-title" id="dynamic-title">よくあるご質問（FAQ）</h1>
    </div>
</header>

<main class="main-container" id="main-content">
    <p class="loading">データを読み込み中...</p>
</main>

<script>
    // あなたのGoogleフォーム情報を最初から組み込み済みです
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdgSExp6LSczREuzJmX20E7sNuAHQNFOxSzu-eaMYi-wQVuxg/formResponse";
    const ENTRY_ID_FAQ    = "entry.1110027652";
    const ENTRY_ID_VOTE   = "entry.524450877";

    async function loadFAQ() {
        const mainContent = document.getElementById('main-content');
        const dynamicTitle = document.getElementById('dynamic-title');
        
        try {
            const response = await fetch('./faq_data.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error('データ取得失敗');
            
            const data = await response.json();
            const urlParams = new URLSearchParams(window.location.search);
            const faqIdStr = urlParams.get('id');
            
            if (faqIdStr) {
                const index = parseInt(faqIdStr, 10) - 1;
                if (data[index]) {
                    const currentFaq = data[index];
                    dynamicTitle.textContent = currentFaq.question;
                    
                    mainContent.innerHTML = `
                        <div class="qa-card">
                            <div class="box-q">
                                <span class="prefix-q">Q</span>
                                <p class="text-q">${currentFaq.question}</p>
                            </div>
                            <div class="box-a">
                                <span class="prefix-a">A</span>
                                <div style="width: 100%;">
                                    <p class="text-a">${currentFaq.answer}</p>
                                    <div class="survey-area" id="survey-box">
                                        <p class="survey-title">上記Q&Aは参考になりましたか？</p>
                                        <div class="survey-buttons">
                                            <button class="btn-survey" onclick="submitSurvey('${faqIdStr}', 'はい')">はい</button>
                                            <button class="btn-survey" onclick="submitSurvey('${faqIdStr}', 'いいえ')">いいえ</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <a href="./" class="btn-back">検索結果一覧に戻る</a>
                    `;
                    return;
                }
            }
            
            dynamicTitle.textContent = "よくあるご質問（FAQ）";
            mainContent.innerHTML = '<h2>ご質問一覧</h2>';
            
            if (data.length === 0) {
                mainContent.innerHTML += '<p class="loading">現在FAQはありません。</p>';
                return;
            }
            
            data.forEach((item, i) => {
                const id = i + 1;
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<a href="./?id=${id}">Q. ${item.question}</a>`;
                mainContent.appendChild(div);
            });
            
        } catch (error) {
            console.error(error);
            mainContent.innerHTML = '<p class="loading" style="color:red;">データの読み込みに失敗しました。</p>';
        }
    }

    // アンケート送信処理（最もエラーが起きにくいシンプルな方式に統一）
    function submitSurvey(faqId, voteValue) {
        const surveyBox = document.getElementById('survey-box');
        surveyBox.innerHTML = '<p class="survey-thanks">投票ありがとうございました。</p>';

        const formData = new FormData();
        formData.append(ENTRY_ID_FAQ, "FAQ-" + faqId);
        formData.append(ENTRY_ID_VOTE, voteValue);

        fetch(GOOGLE_FORM_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
        }).catch(err => console.log("送信"));
    }

    window.addEventListener('DOMContentLoaded', loadFAQ);
</script>

</body>
</html>
