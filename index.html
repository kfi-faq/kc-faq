<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よくあるご質問｜快活CLUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
            line-height: 1.7;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
        }

        /* ─── 1. グローバルヘッダー（本家サイズ・配置を完全指定） ─── */
        .kaikatsu-global-header {
            background-color: #ffffff;
            border-bottom: 1px solid #e1e8ed;
            height: 74px; /* 💡ヘッダー全体のheightを74pxに固定 */
            box-sizing: border-box;
            padding: 0 40px 0 0; /* 右端のみ余白、左端はロゴのために0 */
        }
        .header-container {
            width: 100%;
            max-width: 100%; /* 左右にパキッと分けるため全幅指定 */
            height: 100%;
            display: flex;
            justify-content: space-between; /* 左寄せ・右寄せをはっきり分離 */
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            height: 100%;
            gap: 40px; /* ロゴとナビの間隔 */
        }
        .logo-link {
            display: flex;
            align-items: center;
            height: 100%;
        }
        .logo-link img {
            height: 73px; /* 💡ロゴの縦幅を73pxに固定（ヘッダーとほぼ完全一致） */
            width: auto;
            display: block;
        }
        /* 左寄せナビゲーション */
        .main-nav {
            display: flex;
            gap: 28px;
            align-items: center;
        }
        .main-nav a {
            color: #e65500;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px; /* 💡フォントサイズを15pxに固定 */
            letter-spacing: 0.02em;
        }
        .main-nav a:hover {
            text-decoration: underline;
        }

        /* 右寄せアクションボタン・SNS */
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            height: 100%;
        }
        .btn-reserve {
            background-color: #0d4da1;
            color: #ffffff;
            padding: 9px 24px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.05em;
        }
        .btn-contact {
            background-color: #000000;
            color: #ffffff;
            padding: 9px 24px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.05em;
        }
        .btn-reserve:hover, .btn-contact:hover {
            opacity: 0.8;
        }
        .sns-links {
            display: flex;
            gap: 18px;
            align-items: center;
            margin-left: 5px;
        }
        .sns-icon {
            color: #e65500;
            font-size: 18px;
            text-decoration: none;
        }

        /* ─── 2. サブヘッダー（背景画像エリアの縦幅を本家に完全一致） ─── */
        .kaikatsu-lower-area {
            background-image: url("lower-visual.jpg");
            background-size: cover;
            background-position: center;
            position: relative;
            height: 220px; /* 💡サブヘッダーの縦幅を本家スクショの比率にジャストフィット */
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .kaikatsu-lower-area::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }
        .lower-area-inner {
            max-width: 1200px;
            width: 100%;
            height: 100%;
            margin: 0 auto;
            padding: 25px 40px;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            box-sizing: border-box;
        }
        .breadcrumbs {
            font-size: 12px;
            color: #cccccc;
            font-weight: 500;
        }
        .breadcrumbs a {
            color: #cccccc;
            text-decoration: none;
        }
        .breadcrumbs a:hover {
            text-decoration: underline;
        }
        .main-title-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
        }
        .main-title {
            font-size: 32px;
            font-weight: 400;
            color: #ffffff;
            margin: 0;
            letter-spacing: 0.08em;
        }

        /* ─── 3. メインコンテンツ（ご質問一覧） ─── */
        .main-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        h2.headline {
            font-size: 24px;
            color: #03234d;
            border-bottom: 2px solid #03234d;
            padding-bottom: 12px;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 40px;
        }

        /* Q&Aカードデザイン */
        .qa-card {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .box-q, .box-a {
            background-color: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            padding: 25px 30px;
            display: flex;
            align-items: flex-start;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .box-q {
            border-left: 6px solid #e65500;
        }
        .box-a {
            border-left: 6px solid #03234d;
        }
        
        .prefix-q, .prefix-a {
            font-size: 24px;
            font-weight: 900;
            margin-right: 20px;
            flex-shrink: 0;
            line-height: 1;
            font-family: 'Arial Black', sans-serif;
        }
        .prefix-q { color: #e65500; }
        .prefix-a { color: #03234d; }

        .text-q {
            font-size: 18px;
            font-weight: bold;
            color: #03234d;
            margin: 0;
        }
        .text-a {
            font-size: 16px;
            color: #333;
            white-space: pre-wrap;
            margin: 0;
            width: 100%;
        }

        /* アンケートエリア */
        .survey-area {
            border-top: 1px dashed #e1e8ed;
            margin-top: 30px;
            padding-top: 25px;
            text-align: center;
        }
        .survey-title {
            font-size: 14px;
            color: #555;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .survey-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-survey {
            background-color: #fff;
            border: 2px solid #03234d;
            color: #03234d;
            border-radius: 4px;
            padding: 8px 35px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 110px;
        }
        .btn-survey:hover {
            background-color: #03234d;
            color: #fff;
        }
        .survey-thanks {
            color: #198754;
            font-weight: bold;
            font-size: 14px;
            background-color: #e8f5e9;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 4px;
        }

        /* ボタン＆リスト */
        .btn-back {
            display: block;
            width: 100%;
            background-color: #03234d;
            border: none;
            border-radius: 4px;
            padding: 14px 0;
            text-align: center;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            margin-top: 30px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        .btn-back:hover {
            background-color: #011430;
        }

        .list-item {
            background: #f4f4f4;
            margin-bottom: 8px;
            padding: 16px 20px;
            border-radius: 4px;
            border: none;
            transition: all 0.2s;
            position: relative;
        }
        .list-item::after {
            content: "＋";
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #e65500;
            font-weight: bold;
            font-size: 16px;
        }
        .list-item:hover {
            background-color: #e1e8ed;
            transform: translateX(2px);
        }
        .list-item a {
            color: #333;
            text-decoration: none;
            font-weight: 500;
            display: block;
            padding-right: 30px;
        }
        
        /* レスポンシブ */
        @media (max-width: 1024px) {
            .kaikatsu-global-header { padding: 0 15px 0 0; height: auto; }
            .header-container { flex-wrap: wrap; padding: 10px 0; }
            .header-left, .header-right { width: 100%; justify-content: space-between; }
            .main-nav { width: 100%; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
            .kaikatsu-lower-area { height: 180px; }
        }
    </style>
</head>
<body>

<header class="kaikatsu-global-header">
    <div class="header-container">
        <div class="header-left">
            <a href="./" class="logo-link">
                <img src="logo01.svg" alt="快活CLUB">
            </a>
            <nav class="main-nav">
                <a href="https://www.kaikatsu.jp/guide/" target="_blank">はじめての方</a>
                <a href="https://www.kaikatsu.jp/shop/" target="_blank">店舗検索・料金</a>
                <a href="https://www.kaikatsu.jp/enjoy/" target="_blank">快活CLUBのサービス</a>
                <a href="https://www.kaikatsu.jp/food/" target="_blank">お食事メニュー</a>
            </nav>
        </div>
        <div class="header-right">
            <a href="https://reservation.kaikatsu.jp/" target="_blank" class="btn-reserve">鍵付完全個室WEB予約</a>
            <a href="https://www.kaikatsu.jp/contact/" target="_blank" class="btn-contact">お問い合わせ</a>
            <div class="sns-links">
                <a href="https://x.com/kaikatsuclub_jp" target="_blank" class="sns-icon"><i class="fab fa-twitter"></i></a>
                <a href="https://www.facebook.com/kaikatsu.jp/" target="_blank" class="sns-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/kaikatsuclub_jp/" target="_blank" class="sns-icon"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>
</header>

<div class="kaikatsu-lower-area">
    <div class="lower-area-inner">
        <nav class="breadcrumbs">
            <a href="https://www.kaikatsu.jp/" target="_blank">快活CLUBトップ</a> &gt; <span id="breadcrumb-current">よくあるご質問</span>
        </nav>
        <div class="main-title-container">
            <h1 class="main-title" id="dynamic-title">よくあるご質問</h1>
        </div>
    </div>
</div>

<main class="main-container" id="main-content">
    <p class="loading">データを読み込み中...</p>
</main>

<script>
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdgSExp6LSczREuzJmX20E7sNuAHQNFOxSzu-eaMYi-wQVuxg/formResponse";
    const ENTRY_ID_FAQ    = "entry.1110027652";
    const ENTRY_ID_VOTE   = "entry.524450877";

    async function loadFAQ() {
        const mainContent = document.getElementById('main-content');
        const dynamicTitle = document.getElementById('dynamic-title');
        const breadcrumbCurrent = document.getElementById('breadcrumb-current');
        
        try {
            const response = await fetch('./faq_data.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error('データ取得失敗');
            
            const data = await response.json();
            const urlParams = new URLSearchParams(window.location.search);
            const faqIdStr = urlParams.get('id');
            
            // 1ページ1FAQ 表示モード
            if (faqIdStr) {
                const currentFaq = data.find(item => item.id === faqIdStr);
                
                if (currentFaq) {
                    dynamicTitle.textContent = currentFaq.question;
                    breadcrumbCurrent.textContent = "FAQ詳細";
                    
                    mainContent.innerHTML = `
                        <div class="qa-card">
                            <div class="box-q">
                                <span class="prefix-q">Q</span>
                                <p class="text-q">${currentFaq.question}</p>
                            </div>
                            <div class="box-a">
                                <span class="prefix-a">A</span>
                                <div style="width: 100%;">
                                    <p class="text-a">${currentFaq.answer}</p>
                                    <div class="survey-area" id="survey-box">
                                        <p class="survey-title">上記Q&Aは参考になりましたか？</p>
                                        <div class="survey-buttons">
                                            <button class="btn-survey" onclick="submitSurvey('${faqIdStr}', 'はい')">はい</button>
                                            <button class="btn-survey" onclick="submitSurvey('${faqIdStr}', 'いいえ')">いいえ</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <a href="./" class="btn-back">検索結果一覧に戻る</a>
                    `;
                    return;
                }
            }
            
            // 一覧表示モード
            dynamicTitle.textContent = "よくあるご質問";
            breadcrumbCurrent.textContent = "よくあるご質問";
            mainContent.innerHTML = '<h2 class="headline">ご質問一覧</h2>';
            
            if (data.length === 0) {
                mainContent.innerHTML += '<p class="loading">現在FAQはありません。</p>';
                return;
            }
            
            data.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<a href="./?category=${item.category}&id=${item.id}">Q. ${item.question}</a>`;
                mainContent.appendChild(div);
            });
            
        } catch (error) {
            console.error(error);
            mainContent.innerHTML = '<p class="loading" style="color:red;">データの読み込みに失敗しました。</p>';
        }
    }

    function submitSurvey(faqId, voteValue) {
        const surveyBox = document.getElementById('survey-box');
        surveyBox.innerHTML = '<p class="survey-thanks">🎉 投票ありがとうございました。</p>';

        const params = new URLSearchParams();
        params.append(ENTRY_ID_FAQ, "FAQ-" + faqId);
        params.append(ENTRY_ID_VOTE, voteValue);

        fetch(GOOGLE_FORM_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params
        }).catch(err => console.log("送信完了"));
    }

    window.addEventListener('DOMContentLoaded', loadFAQ);
</script>

</body>
</html>
